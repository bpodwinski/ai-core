name: mcp_benoitpodwinski_com

services:
  cf-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: mcp-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    environment:
      TUNNEL_TOKEN: "${MCP_TUNNEL_TOKEN}"
    depends_on:
      - nginx

  nginx:
    image: nginx:alpine
    container_name: mcp-nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./nginx/mcp.conf.template:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - oauth
      - mcp-leptos

  oauth:
    build: ./oauth/
    container_name: mcp-oauth
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      OAUTH_ISSUER: "${OAUTH_ISSUER}"
      MCP_API_KEY: "${MCP_API_KEY}"

  # Custom Rust MCP (pas de MCP communautaire pour Leptos)
  mcp-leptos:
    build: ./servers/rust-docs/
    container_name: mcp-leptos
    restart: unless-stopped
    expose:
      - "80"

  # Exemple MCP communautaire via supergateway
