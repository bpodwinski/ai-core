name: mcp_benoitpodwinski_com

services:
  cf-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: mcp-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    environment:
      TUNNEL_TOKEN: "${MCP_TUNNEL_TOKEN}"
    depends_on:
      nginx:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: mcp-nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./nginx/mcp.conf.template:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      oauth:
        condition: service_healthy
      mcp-leptos:
        condition: service_healthy
      mcp-leptos-use:
        condition: service_healthy
      mcp-rust:
        condition: service_healthy
      mcp-daisyui:
        condition: service_healthy
      mcp-induflow:
        condition: service_healthy
      mcp-tailwindcss:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  oauth:
    build: ./oauth/
    container_name: mcp-oauth
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      OAUTH_ISSUER: "${OAUTH_ISSUER}"
      MCP_API_KEY: "${MCP_API_KEY}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/.well-known/oauth-authorization-server"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Same image, different DOCS_PATH per service
  mcp-leptos:
    build: ./servers/rust-docs/
    image: mcp-rust-docs:local
    container_name: mcp-leptos
    restart: unless-stopped
    expose:
      - "80"
    environment:
      DOCS_PATH: /docs/leptos
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mcp-leptos-use:
    image: mcp-rust-docs:local
    container_name: mcp-leptos-use
    restart: unless-stopped
    expose:
      - "80"
    environment:
      DOCS_PATH: /docs/leptos-use
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mcp-rust:
    image: mcp-rust-docs:local
    container_name: mcp-rust
    restart: unless-stopped
    expose:
      - "80"
    environment:
      DOCS_PATH: /docs/rust
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mcp-daisyui:
    image: mcp-rust-docs:local
    container_name: mcp-daisyui
    restart: unless-stopped
    expose:
      - "80"
    environment:
      DOCS_PATH: /docs/daisyui
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mcp-induflow:
    image: mcp-rust-docs:local
    container_name: mcp-induflow
    restart: unless-stopped
    expose:
      - "80"
    environment:
      DOCS_PATH: /docs/induflow
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mcp-tailwindcss:
    image: mcp-rust-docs:local
    container_name: mcp-tailwindcss
    restart: unless-stopped
    expose:
      - "80"
    environment:
      DOCS_PATH: /docs/tailwindcss
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
