name: mcp_benoitpodwinski_com

services:
  cf-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: mcp-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    environment:
      TUNNEL_TOKEN: "${MCP_TUNNEL_TOKEN}"
    depends_on:
      nginx:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: mcp-nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./nginx/mcp.conf.template:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      oauth:
        condition: service_healthy
      mcp-docs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  oauth:
    build: ./oauth/
    container_name: mcp-oauth
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      OAUTH_ISSUER: "${OAUTH_ISSUER}"
      MCP_API_KEY: "${MCP_API_KEY}"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8080/.well-known/oauth-authorization-server', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Single multi-tenant docs server — serves all doc sources via DOCS_PATH=/docs
  # Also embeds rust-docs-mcp as a subprocess for on-demand crate analysis
  mcp-docs:
    build:
      context: .
      dockerfile: servers/rust-docs/Dockerfile
    image: mcp-rust-docs:local
    container_name: mcp-docs
    restart: unless-stopped
    expose:
      - "80"
    environment:
      DOCS_PATH: /docs
      RUST_DOCS_MCP_CACHE_DIR: /cache
    volumes:
      - rust_docs_cache:/cache
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  rust_docs_cache:
