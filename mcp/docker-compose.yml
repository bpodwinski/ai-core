name: mcp_benoitpodwinski_com

services:
  cf-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: mcp-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    environment:
      TUNNEL_TOKEN: "${MCP_TUNNEL_TOKEN}"
    depends_on:
      nginx:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: mcp-nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./nginx/mcp.conf.template:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      mcp-docs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Single multi-tenant docs server — serves all doc sources via DOCS_PATH=/docs,
  # OAuth 2.1 PKCE endpoints, and embeds rust-docs-mcp as a subprocess for
  # on-demand crate analysis
  mcp-docs:
    build:
      context: .
      dockerfile: crates/mcp-server/Dockerfile
    image: mcp-rust-docs:local
    container_name: mcp-docs
    restart: unless-stopped
    expose:
      - "80"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4G"
          pids: 512
        reservations:
          memory: "256M"
    environment:
      DOCS_PATH: /docs
      RUST_DOCS_MCP_CACHE_DIR: /cache
      RUST_LOG: info
      OAUTH_ISSUER: "${OAUTH_ISSUER}"
      MCP_API_KEY: "${MCP_API_KEY}"
      OAUTH_ALLOWED_ORIGINS: "${OAUTH_ALLOWED_ORIGINS:-}"
    volumes:
      - rust_docs_cache:/cache
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  rust_docs_cache:
