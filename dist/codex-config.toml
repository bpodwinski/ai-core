# Codex CLI — MCP servers configuration
# Source : https://raw.githubusercontent.com/bpodwinski/ai-core/main/dist/codex-config.toml
#
# Installation :
#   curl -fsSL https://raw.githubusercontent.com/bpodwinski/ai-core/main/dist/codex-config.toml \
#        >> ~/.codex/config.toml
#
# Auth (choisir une option) :
#   Option A — Bearer token : export MCP_API_KEY=<your-key>
#   Option B — OAuth PKCE   : codex mcp login <server-name>
[mcp_servers.leptos]
url = "https://mcp.benoitpodwinski.com/leptos/mcp"
bearer_token_env_var = "MCP_API_KEY"
# description = "Leptos framework — official book (github.com/leptos-rs/book)"

[mcp_servers.leptos-use]
url = "https://mcp.benoitpodwinski.com/leptos-use/mcp"
bearer_token_env_var = "MCP_API_KEY"
# description = "leptos-use hooks library (github.com/synphonyte/leptos-use)"

[mcp_servers.rust]
url = "https://mcp.benoitpodwinski.com/rust/mcp"
bearer_token_env_var = "MCP_API_KEY"
# description = "The Rust Programming Language book (github.com/rust-lang/book)"

[mcp_servers.daisyui]
url = "https://mcp.benoitpodwinski.com/daisyui/mcp"
bearer_token_env_var = "MCP_API_KEY"
# description = "DaisyUI component library reference (daisyui.com/llms.txt)"

[mcp_servers.induflow]
url = "https://mcp.benoitpodwinski.com/induflow/mcp"
bearer_token_env_var = "MCP_API_KEY"
# description = "InduFlow PartHub API documentation"

[mcp_servers.tailwindcss]
url = "https://mcp.benoitpodwinski.com/tailwindcss/mcp"
bearer_token_env_var = "MCP_API_KEY"
# description = "Tailwind CSS v4 — docs + catalog complet des classes"
