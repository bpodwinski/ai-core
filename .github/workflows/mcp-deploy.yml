name: Deploy MCP

on:
  push:
    branches: [main]
    paths:
      - "mcp/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Sync mcp/ → deploy path
        run: |
          rsync -az --delete \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='target/' \
            mcp/ \
            "${{ secrets.DEPLOY_PATH }}/"

      - name: Rebuild containers
        run: |
          cd "${{ secrets.DEPLOY_PATH }}"
          docker compose up -d --build --force-recreate
