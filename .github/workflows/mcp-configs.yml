name: Generate MCP configs

on:
  push:
    branches: [main]
    paths:
      - "mcp/servers-manifest.json"
      - "mcp/generate-configs.mjs"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate MCP configs
        run: node mcp/generate-configs.mjs

      - name: Commit dist/ if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/claude-mcp.json dist/codex-mcp.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore: regenerate MCP configs [skip ci]"
            git push
          fi
