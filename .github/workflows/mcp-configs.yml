name: Generate MCP configs

on:
  push:
    branches: [main]
    paths:
      - "mcp/servers-manifest.json"
      - "mcp/generate-configs.mjs"
      - "install.ps1"
      - "install.sh"
      - ".claude/settings.json"
      - ".claude/hooks/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Generate MCP configs
        run: node mcp/generate-configs.mjs

      - name: Package all configs
        run: |
          mkdir -p staging/.claude/hooks staging/.codex
          cp dist/claude-mcp.json        staging/.mcp.json
          cp dist/codex-config.toml      staging/.codex/config.toml
          cp .claude/settings.json       staging/.claude/settings.json
          cp .claude/hooks/rust-check.py staging/.claude/hooks/rust-check.py
          cp install.sh                  staging/install.sh
          cp install.ps1                 staging/install.ps1
          cd staging && zip -r ../dist/claude-config.zip .
          # Also publish install.ps1 as a standalone asset for irm | iex usage
          cp ../install.ps1 ../dist/install.ps1

      - name: Publish versioned GitHub Release
        run: |
          TAG="mcp-configs-$(date -u +%Y%m%d)-${{ github.run_number }}"
          gh release create "$TAG" \
            --title "MCP Configs ${TAG#mcp-configs-}" \
            --notes "Configurations MCP auto-générées depuis \`mcp/servers-manifest.json\`.\n\nExtraire \`claude-config.zip\` à la racine du projet pour tout installer." \
            --latest \
            dist/claude-config.zip \
            dist/install.ps1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
