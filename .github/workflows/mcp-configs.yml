name: Generate MCP configs

on:
  push:
    branches: [main]
    paths:
      - "mcp/servers-manifest.json"
      - "mcp/generate-configs.mjs"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Generate MCP configs
        run: node mcp/generate-configs.mjs

      - name: Publish versioned GitHub Release
        run: |
          TAG="mcp-configs-$(date -u +%Y%m%d)-${{ github.run_number }}"
          gh release create "$TAG" \
            --title "MCP Configs ${TAG#mcp-configs-}" \
            --notes "Configurations MCP auto-générées depuis \`mcp/servers-manifest.json\`." \
            --latest \
            dist/claude-mcp.json \
            dist/codex-config.toml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
