name: Generate MCP configs

on:
  push:
    branches: [main]
    paths:
      - "mcp/servers-manifest.json"
      - "mcp/generate-configs.mjs"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate MCP configs
        run: node mcp/generate-configs.mjs

      - name: Publish to GitHub Releases (rolling mcp-configs tag)
        run: |
          # Supprimer release + tag existants pour pouvoir recréer proprement
          gh release delete mcp-configs --yes --cleanup-tag 2>/dev/null || true
          # Créer la nouvelle release avec les assets mis à jour
          gh release create mcp-configs \
            --title "MCP Configs" \
            --notes "Configurations MCP auto-générées. Voir README pour l'utilisation." \
            --latest=false \
            dist/claude-mcp.json \
            dist/codex-config.toml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
